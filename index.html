<!DOCTYPE html>
<html>
    
    <head>
        <title>
            Icon Template Square
        </title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.1/buzz.min.js"></script>
        <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
            .shrink-image:hover {
                transform: scale(0.9);
            }
        </style>
    </head>

    <body>

        <div class="row">
            <div class="image-container"><img class="shrink-image" id="target" src="img/target2.png" onmouseover="this.src='img/target.png';" onmouseout="this.src='img/target2.png';" height="200" width="200"/></div>
            <div class="image-container"><img class="shrink-image" id="book" src="img/book2.png" onmouseover="this.src='img/book.png';" onmouseout="this.src='img/book2.png';" height="200" width="200"/></div>
            <div class="image-container"><img class="shrink-image" id="write" src="img/write.png" onmouseover="this.src='img/write2.png';" onmouseout="this.src='img/write.png';" height="200" width="200"/></div>
        </div>

        <div class="row">
           <div class="image-container"><img class="shrink-image" id="bulb" src="img/bulb.png" onmouseover="this.src='img/bulb2.png';" onmouseout="this.src='img/bulb.png';" height="200" width="200"/></div>
            <div class="image-container"><img class="shrink-image" id="heart" src="img/heart2.png" onmouseover="this.src='img/heart.png';" onmouseout="this.src='img/heart2.png';" height="200" width="200"/></div>
            <div class="image-container"><img class="shrink-image" id="sound" src="img/sound.png" onmouseover="this.src='img/sound2.png';" onmouseout="this.src='img/sound.png';" height="200" width="200"/></div>
        </div>

        <div class="row">
             <div class="image-container"><img class="shrink-image" id="words" src="img/words.png" onmouseover="this.src='img/words2.png';" onmouseout="this.src='img/words.png';" height="200" width="200"/></div>
            <div class="image-container"><img class="shrink-image" id="timer" src="img/timer.png" onmouseover="this.src='img/timer2.png';" onmouseout="this.src='img/timer.png';" height="200" width="200"/></div>
            <div class="image-container"><img class="shrink-image" id="speak" src="img/speak2.png" onmouseover="this.src='img/speak.png';" onmouseout="this.src='img/speak2.png';" height="200" width="200"/></div>
        </div>

         <script>
            var sound1 = new buzz.sound("sound/arrow.mp3");
            var sound2 = new buzz.sound("sound/bookopen.mp3");
            var sound3 = new buzz.sound("sound/scribble.mp3");
            var sound4 = new buzz.sound("sound/lightup.mp3");
            var sound5 = new buzz.sound("sound/swallow.mp3");
            var sound6 = new buzz.sound("sound/hellomale.mp3");
            var sound7 = new buzz.sound("sound/card.mp3");
            var sound8 = new buzz.sound("sound/tick.mp3");
            var sound9 = new buzz.sound("sound/hellofemale.mp3");

            window.onload = function() {
                document.getElementById('target').addEventListener('mouseover', function () {sound1.play();});
                document.getElementById('book').addEventListener('mouseover', function () {sound2.play();});
                document.getElementById('write').addEventListener('mouseover', function () {sound3.play();});
                document.getElementById('bulb').addEventListener('mouseover', function () {sound4.play();});
                document.getElementById('heart').addEventListener('mouseover', function () {sound5.play();});
                document.getElementById('sound').addEventListener('mouseover', function () {sound6.play();});
                document.getElementById('words').addEventListener('mouseover', function () {sound7.play();});
                document.getElementById('timer').addEventListener('mouseover', function () {sound8.play();});
                document.getElementById('speak').addEventListener('mouseover', function () {sound9.play();});
            };
        </script>
        
    </body>
    
</html>
